# Cut a release whenever a new tag is pushed to the repo.
name: Release
on:
    # Can be triggered from the tag.yaml workflow
    workflow_call:
        inputs:
            tag_name:
                required: true
                type: string
        secrets:
            publish_token:
                required: true
    # Or, developers can manually push a tag from their clone
    push:
        tags:
            - "v*.*.*"
permissions:
    contents: read

jobs:
    release:
        permissions:
            id-token: write
            attestations: write
            contents: write
        uses: bazel-contrib/.github/.github/workflows/release_ruleset.yaml@a841d62420f41a87a601fb331f3c2c2cc088506e # v7.2.3
        with:
            bazel_test_command: "bazel build //:bcr_dist_tar"
            prerelease: false
            release_files: "bazel-bin/protobuf-javascript-*.tar.gz"
            tag_name: ${{ inputs.tag_name || github.ref_name }}
    publish:
        needs: release
        permissions:
            id-token: write
            attestations: write
            contents: write
        uses: ./.github/workflows/publish.yaml
        with:
            tag_name: ${{ inputs.tag_name || github.ref_name }}
        secrets:
            publish_token: ${{ secrets.publish_token || secrets.BCR_PUBLISH_TOKEN }}
